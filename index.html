<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>作品發表畫廊</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #080604; }
    canvas { display: block; }

    /* ════════════════════════════
       MODAL
    ════════════════════════════ */
    #modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      /* 背景淡入 */
      transition: background 0.45s ease;
    }
    #modal-backdrop.opening,
    #modal-backdrop.open {
      background: rgba(0,0,0,0.92);
      pointer-events: all;
    }
    #modal-backdrop.closing {
      background: rgba(0,0,0,0);
      pointer-events: none;
    }

    /* 畫框容器 — 負責 scale + fade */
    #modal-box {
      position: relative;
      width: min(90vw, 1100px);
      height: min(88vh, 700px);

      /* 初始狀態：縮小 + 透明 */
      opacity: 0;
      transform: scale(0.55);
      transition:
        opacity  0.48s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.48s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* 彈出放大 */
    #modal-backdrop.opening #modal-box,
    #modal-backdrop.open    #modal-box {
      opacity: 1;
      transform: scale(1);
    }
    /* 關閉縮小 */
    #modal-backdrop.closing #modal-box {
      opacity: 0;
      transform: scale(0.55);
    }

    /* 金色畫框 */
    .modal-frame {
      width: 100%; height: 100%;
      padding: 15px;
      background: linear-gradient(145deg,#6b4f2c,#3d2e1a,#7a5c38,#3d2e1a,#5c4428);
      box-shadow:
        inset 2px 2px 4px rgba(255,220,150,0.12),
        inset -2px -2px 4px rgba(0,0,0,0.5),
        0 0 0 1px rgba(201,169,110,0.5),
        0 50px 120px rgba(0,0,0,0.98);
    }
    .modal-frame-inner {
      width: 100%; height: 100%;
      padding: 8px;
      background: #100c06;
      box-shadow: inset 0 0 0 1px rgba(201,169,110,0.25),
                  inset 0 0 24px rgba(0,0,0,0.5);
    }
    #modal-iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* 關閉按鈕 */
    #modal-close {
      position: absolute;
      top: -20px; right: -20px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #0e0a06;
      border: 1px solid #c9a96e;
      color: #c9a96e;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      transition: background 0.2s, color 0.2s, transform 0.32s;
    }
    #modal-close:hover {
      background: #c9a96e;
      color: #0e0a06;
      transform: rotate(90deg);
    }

    /* 作品名稱標籤 */
    #modal-label {
      position: absolute;
      bottom: -32px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Georgia', serif;
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      color: #e8d5a3;
      white-space: nowrap;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div id="modal-backdrop">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <div class="modal-frame">
      <div class="modal-frame-inner">
        <iframe id="modal-iframe" src="" title="作品預覽"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
      </div>
    </div>
    <div id="modal-label"></div>
  </div>
</div>

<script src="sketch.js"></script>
</body>
</html>
